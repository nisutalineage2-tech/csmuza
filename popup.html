<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #ff6b35, #d63031);
      padding: 20px;
      text-align: center;
    }

    .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.8; }

    .content { padding: 20px; }

    .update-banner {
      display: none;
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .update-banner.show { display: block; }

    .update-banner h3 {
      font-size: 13px;
      margin-bottom: 6px;
      color: #ff6b35;
    }

    .update-banner p {
      font-size: 11px;
      color: #ccc;
      margin-bottom: 10px;
    }

    .btn-update {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #ff6b35;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-update:hover { background: #e55a2b; transform: scale(1.02); }

    .btn-open {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff6b35, #d63031);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .btn-open:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
    }

    .section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .form-group input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus { border-color: #ff6b35; }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 14px;
    }

    .toggle-group span { font-size: 13px; }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333;
      border-radius: 24px;
      transition: 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .toggle-slider { background: #ff6b35; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    .btn-save {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:hover { background: rgba(255,255,255,0.12); }

    .saved-msg {
      text-align: center;
      color: #ff6b35;
      font-size: 12px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .saved-msg.show { opacity: 1; }

    .version-info {
      text-align: center;
      font-size: 10px;
      color: #555;
      margin-top: 10px;
    }

    .version-info a {
      color: #ff6b35;
      text-decoration: none;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 10px;
      color: #444;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* Pizza Loading Animation */
    .pizza-loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .pizza-loading.show { display: block; }

    .pizza-spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 12px;
      animation: spin 1s linear infinite;
      font-size: 50px;
      line-height: 60px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pizza-loading-text {
      color: #ff6b35;
      font-size: 13px;
      font-weight: 600;
    }

    .pizza-loading-sub {
      color: #888;
      font-size: 11px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CSMuza</h1>
    <p>Encuentra skins con profit</p>
  </div>

  <div class="content">
    <div class="pizza-loading" id="pizzaLoading">
      <div class="pizza-spinner">🍕</div>
      <div class="pizza-loading-text">Actualizando CSMuza...</div>
      <div class="pizza-loading-sub">Descargando ultima version</div>
    </div>

    <div id="mainContent">
      <div class="update-banner" id="updateBanner">
        <h3>Nueva version disponible!</h3>
        <p id="updateText">Hay una nueva version</p>
        <button class="btn-update" id="btnUpdate">Descargar</button>
      </div>

      <button class="btn-open" id="openApp">Abrir Profit Finder</button>

      <div class="section-title">Configuracion</div>

      <div class="form-group">
        <label>Profit Minimo (%)</label>
        <input type="number" id="profitMin" value="15" min="1" max="100">
      </div>

      <div class="form-group">
        <label>Precio Maximo (USD)</label>
        <input type="number" id="maxPrice" value="50" min="1" max="500">
      </div>

      <div class="toggle-group">
        <span>Auto-escaneo en CSFloat</span>
        <label class="toggle">
          <input type="checkbox" id="enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <button class="btn-save" id="saveBtn">Guardar</button>
      <div class="saved-msg" id="savedMsg">Guardado!</div>

      <div class="version-info">
        v<span id="currentVersion">1.2.0</span> |
        <a href="#" id="checkUpdateBtn">Buscar actualizaciones</a>
      </div>
    </div>
  </div>

  <div class="footer">CSMuza</div>

  <script src="js/popup.js"></script>
</body>
</html>
