<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .header p {
      font-size: 11px;
      opacity: 0.8;
    }

    .content {
      padding: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input[type="number"]:focus {
      border-color: #00d4ff;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .toggle-group span {
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #333;
      border-radius: 24px;
      transition: 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: #00ff88;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .saved-msg {
      text-align: center;
      color: #00ff88;
      font-size: 12px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .saved-msg.show {
      opacity: 1;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 10px;
      color: #555;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .footer a {
      color: #00d4ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CSFloat Profit Finder</h1>
    <p>Busca skins con profit en CSFloat</p>
  </div>

  <div class="content">
    <div class="form-group">
      <label>Profit Minimo (%)</label>
      <input type="number" id="profitMin" value="15" min="1" max="100">
    </div>

    <div class="toggle-group">
      <span>Activar Extension</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="btn-save" id="saveBtn">Guardar</button>
    <div class="saved-msg" id="savedMsg">Guardado!</div>
  </div>

  <div class="footer">
    CSFloat Profit Finder v1.0 | <a href="https://csfloat.com" target="_blank">Abrir CSFloat</a>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
